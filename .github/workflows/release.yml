name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-13
            goos: darwin
            goarch: amd64
          - runner: macos-14
            goos: darwin
            goarch: arm64
          - runner: windows-latest
            goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Windows C compiler
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Add Windows C compiler to PATH
        if: runner.os == 'Windows'
        shell: bash
        run: echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"

      - name: Build release package
        shell: bash
        run: |
          case "${{ matrix.goos }}" in
            darwin) ext=dylib ;;
            windows) ext=dll ;;
            *) ext=so ;;
          esac
          mkdir -p build
          CGO_ENABLED=1 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath -buildmode=c-shared \
              -ldflags "-s -w -X main.pluginVersion=${GITHUB_REF_NAME#v}" \
              -o "build/codex-quota.${ext}" .
          rm -f build/codex-quota.h
          go run .github/scripts/package-release.go \
            -plugin codex-quota \
            -version "${GITHUB_REF_NAME}" \
            -goos "${{ matrix.goos }}" \
            -goarch "${{ matrix.goarch }}" \
            -binary "build/codex-quota.${ext}" \
            -dist dist

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.zip.sha256

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare checksums
        run: |
          find release-assets -name '*.zip' -exec mv {} . \;
          find release-assets -name '*.zip.sha256' -exec cat {} \; | sort -k2 > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            checksums.txt
